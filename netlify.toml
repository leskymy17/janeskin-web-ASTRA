[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cache node_modules between builds
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle   = true
  minify   = true

[build.processing.js]
  bundle   = true
  minify   = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Redirects
[[redirects]]
  from   = "/o-mne"
  to     = "/#o-mne"
  status = 301

[[redirects]]
  from   = "/services"
  to     = "/sluzby"
  status = 301

[[redirects]]
  from   = "/contact"
  to     = "/kontakt"
  status = 301
